<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body { font-family:Poppins; background:#f0f0f0; padding:20px; }
    h2 { text-align:center; }
    .box { background:white; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    input, select { width:100%; padding:10px; margin:5px 0 10px; border-radius:8px; border:1px solid #ccc; }
    button { padding:10px 15px; background:#2E8B8B; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:5px; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ccc; }
    th { background:#2E8B8B; color:white; }
    .delete-btn { background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div class="box">
  <h3>Manage Categories</h3>
  <input id="newCategory" placeholder="New Category Name">
  <button id="addCatBtn">Add Category</button>
  <table id="categoryTable">
    <thead><tr><th>Category</th><th>Action</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="box">
  <h3>Manage Items</h3>
  <input id="itemName" placeholder="Item Name">
  <input id="itemPrice" placeholder="Price" type="number">
  <select id="itemCategory"></select>
  <button id="addItemBtn">Add / Update Item</button>
  <table id="itemTable">
    <thead><tr><th>Name</th><th>Price</th><th>Category</th><th>Action</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDOb5A4AomHgJTS2HZdyd_w8fgWU87ciNU",
  authDomain: "chaiordering.firebaseapp.com",
  databaseURL: "https://chaiordering-default-rtdb.firebaseio.com",
  projectId: "chaiordering",
  storageBucket: "chaiordering.firebasestorage.app",
  messagingSenderId: "785518509461",
  appId: "1:785518509461:web:b428d69a0819161fc10a9c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔹 References
const catRef = ref(db, "categories");
const itemRef = ref(db, "menu");

const catTable = document.querySelector("#categoryTable tbody");
const itemTable = document.querySelector("#itemTable tbody");
const catSelect = document.getElementById("itemCategory");

// --- Load Categories ---
onValue(catRef, snapshot => {
  const data = snapshot.val() || {};
  catTable.innerHTML = "";
  catSelect.innerHTML = "";
  Object.keys(data).forEach(key => {
    const catName = data[key].name;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${catName}</td><td><button class="delete-btn" onclick="deleteCategory('${key}')">Delete</button></td>`;
    catTable.appendChild(tr);
    const opt = document.createElement("option");
    opt.value = catName;
    opt.textContent = catName;
    catSelect.appendChild(opt);
  });
});

// --- Load Items ---
onValue(itemRef, snapshot => {
  const data = snapshot.val() || {};
  itemTable.innerHTML = "";
  Object.keys(data).forEach(key => {
    const item = data[key];
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.name}</td>
      <td>${item.price}</td>
      <td>${item.category}</td>
      <td>
        <button onclick="editItem('${key}','${item.name}',${item.price},'${item.category}')">Edit</button>
        <button class="delete-btn" onclick="deleteItem('${key}')">Delete</button>
      </td>`;
    itemTable.appendChild(tr);
  });
});

// --- Functions ---
document.getElementById("addCatBtn").onclick = function(){
  const name = document.getElementById("newCategory").value.trim();
  if(!name) return alert("Enter category name");
  push(catRef, {name:name}).then(()=> document.getElementById("newCategory").value="");
};

window.deleteCategory = function(key){
  if(confirm("Delete category? Items will remain.")){
    remove(ref(db,'categories/'+key));
  }
};

document.getElementById("addItemBtn").onclick = function(){
  const name = document.getElementById("itemName").value.trim();
  const price = Number(document.getElementById("itemPrice").value);
  const category = document.getElementById("itemCategory").value;
  if(!name || !price || !category) return alert("Fill all fields");
  push(itemRef, {name, price, category});
  document.getElementById("itemName").value="";
  document.getElementById("itemPrice").value="";
};

window.editItem = function(id,name,price,category){
  document.getElementById("itemName").value = name;
  document.getElementById("itemPrice").value = price;
  document.getElementById("itemCategory").value = category;
  remove(ref(db,'menu/'+id));
};

window.deleteItem = function(id){
  if(confirm("Delete item?")){
    remove(ref(db,'menu/'+id));
  }
};
</script>
</body>
</html>
